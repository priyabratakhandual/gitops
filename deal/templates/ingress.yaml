{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "deal.fullname" . }}
  labels:
    {{- include "deal.labels" . | nindent 4 }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "deal.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
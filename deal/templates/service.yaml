apiVersion: v1
kind: Service

metadata:
  name: {{ include "deal.fullname" . }}
  labels:
    {{- include "deal.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
    {{- include "deal.selectorLabels" . | nindent 4 }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}